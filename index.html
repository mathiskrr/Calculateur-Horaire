<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculateur Horaire</title>
    <link rel="icon" href="img/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" type="text/css" href="styles.css" />

    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=UA-290073534-1"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "UA-290073534-1");
    </script>
  </head>

  <body>
    <div class="floating-actions">
      <button id="languageToggleButton" aria-label="Changer la langue"><img src="" alt="Drapeau langue" /></button>
      <button id="themeToggleButton" aria-label="Basculer le thème">
        <img src="" alt="Icône du thème" />
      </button>
    </div>

    <main class="app-shell container py-4 py-md-5">
      <section class="hero-card mb-4">
        <div class="d-flex align-items-center gap-3 justify-content-center justify-content-md-start">
          <img src="img/logo.png" alt="Logo Application" id="headerImage" />
          <div>
            <h1 class="mb-1" data-i18n="title">Calculateur Horaire</h1>
            <p class="hero-subtitle mb-0" data-i18n="subtitle">
              Entrez vos horaires de la journée pour connaître instantanément votre heure de fin.
            </p>
          </div>
        </div>
      </section>

      <section class="content-grid">
        <article class="glass-card form-card">
          <h2 class="section-title">
            <i class="bi bi-clock-history"></i>
            <span data-i18n="sectionInputs">Saisie des horaires</span>
          </h2>

          <div class="wrapper">
            <label for="heureArrivee" data-i18n="labelArrival">Heure d'arrivée</label>
            <input type="time" id="heureArrivee" placeholder="hh:mm" required />
          </div>

          <div class="wrapper">
            <label for="heurePause" data-i18n="labelBreak">Début de pause déjeuner</label>
            <input type="time" id="heurePause" placeholder="hh:mm" required />
          </div>

          <div class="wrapper">
            <label for="heureReprise" data-i18n="labelResume">Reprise après pause</label>
            <input type="time" id="heureReprise" placeholder="hh:mm" required />
          </div>

          <div class="wrapper">
            <label for="dureeTravail" data-i18n="labelDuration">Durée de travail prévue</label>
            <input type="time" id="dureeTravail" value="08:00" required />
          </div>

          <button id="calculButton" class="primary-action">
            <i class="bi bi-magic"></i>
            <span data-i18n="calculateButton">Calculer mon heure de fin</span>
          </button>

          <p id="resultat" aria-live="polite"></p>
        </article>

        <article class="glass-card history-card">
          <div class="d-flex align-items-center justify-content-between mb-3 gap-2 flex-wrap">
            <h2 class="section-title mb-0">
              <i class="bi bi-journal-text"></i>
              <span data-i18n="sectionHistory">Historique</span>
            </h2>
            <button id="clearHistoryButton" class="secondary-action">
              <i class="bi bi-trash3"></i>
              <span data-i18n="clearHistoryButton">Tout effacer</span>
            </button>
          </div>
          <ul id="historique"></ul>
        </article>
      </section>
    </main>

    <footer>
      <div id="credits">
        <div id="appVersion"></div>
        Powered by HTML, CSS and Javascript<br />
        Design by
        <a href="https://github.com/mathiskrr" rel="noopener" target="_blank">mathiskrr</a>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/notiflix@3.2.8/dist/notiflix-aio-3.2.8.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
